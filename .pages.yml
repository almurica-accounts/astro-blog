# PageCMS Configuration
media:
  input: public
  output: /

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/blog
    view:
      fields: [title, draft, pubDatetime]
    fields:
      - name: author
        label: Author
        type: string
        # Example: Prevent editors from changing the author name after creation
        # readonly: true 
      
      - name: pubDatetime
        label: Published Date
        type: date
        required: true

      - name: modDatetime
        label: Modified Date
        type: date
        # Automatically handled or read-only to maintain audit integrity
        readonly: true

      - name: title
        label: Title
        type: string
        required: true

      - name: ogImage
        label: OG Image
        type: string

      - name: slug
        label: Slug
        type: string
        # Prevents collaborators from breaking URL structures accidentally
        readonly: true

      - name: featured
        label: Featured
        type: boolean

      - name: draft
        label: Draft
        type: boolean
        default: true

      - name: tags
        label: Tags
        type: string
        list: true

      - name: description
        label: Description
        type: string

      - name: body
        label: Body
        type: rich-text

  # Example of a restricted global settings collection
  - name: settings
    label: Site Settings
    type: file
    path: src/data/settings.json
    fields:
      - { name: siteTitle, label: Site Title, type: string }
      - { name: description, label: Meta Description, type: string }